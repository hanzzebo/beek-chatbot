<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beek — AI Travel Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ── Demo page background ──────────────────── -->
  <div class="demo-page">
    <div class="demo-hero">
      <svg class="demo-logo" viewBox="0 0 1582.54541015625 2048.0" width="64" height="82" aria-hidden="true">
        <g transform="matrix(1,0,0,1,791.272705078125,1024.0)">
          <path
            d="M-66.794,420.344 L280.715,420.344 C280.715,420.344 280.715,-67.9743 280.715,-195.244 C280.715,-347.787 157.056,-471.446 4.51312,-471.446 C-148.03,-471.446 -270.787,-347.787 -270.787,-195.244 L-270.787,216.352 C-270.787,329.179 -179.622,420.344 -66.794,420.344 Z"
            fill="none" stroke-width="69.12" stroke="#7132f5" stroke-linecap="square" stroke-linejoin="miter" />
          <path d="M-332.059,141.88 L-622.17,-25.5511 L-332.059,-192.982 L-332.059,141.88 Z" fill="#7132f5" />
          <path
            d="M218.247,355.761 L218.247,188.33 C218.247,95.8022 143.344,20.899 50.8163,20.899 C-41.7112,20.899 -116.614,95.8022 -116.614,188.33 C-116.614,280.857 -41.7112,355.761 50.8163,355.761 L218.247,355.761 Z"
            fill="#7132f5" />
          <path
            d="M340.357,184.568 L340.357,454.904 L418.468,454.904 C492.879,454.904 553.636,394.146 553.636,319.736 C553.636,245.325 492.879,184.568 418.468,184.568 L340.357,184.568 Z"
            fill="#7132f5" />
        </g>
      </svg>
      <h1>Beek</h1>
      <p>Your AI-powered travel companion.<br />Click the bird to start chatting.</p>
    </div>
  </div>

  <!-- ── Floating trigger ──────────────────────── -->
  <button class="chat-fab" id="chat-fab" aria-label="Open chat">
    <svg class="fab-icon fab-icon-bird" viewBox="0 0 1582.54541015625 2048.0" width="28" height="36" aria-hidden="true">
      <g transform="matrix(1,0,0,1,791.272705078125,1024.0)">
        <path
          d="M-66.794,420.344 L280.715,420.344 C280.715,420.344 280.715,-67.9743 280.715,-195.244 C280.715,-347.787 157.056,-471.446 4.51312,-471.446 C-148.03,-471.446 -270.787,-347.787 -270.787,-195.244 L-270.787,216.352 C-270.787,329.179 -179.622,420.344 -66.794,420.344 Z"
          fill="none" stroke-width="69.12" stroke="#ffffff" stroke-linecap="square" stroke-linejoin="miter" />
        <path d="M-332.059,141.88 L-622.17,-25.5511 L-332.059,-192.982 L-332.059,141.88 Z" fill="#ffffff" />
        <path
          d="M218.247,355.761 L218.247,188.33 C218.247,95.8022 143.344,20.899 50.8163,20.899 C-41.7112,20.899 -116.614,95.8022 -116.614,188.33 C-116.614,280.857 -41.7112,355.761 50.8163,355.761 L218.247,355.761 Z"
          fill="#ffffff" />
        <path
          d="M340.357,184.568 L340.357,454.904 L418.468,454.904 C492.879,454.904 553.636,394.146 553.636,319.736 C553.636,245.325 492.879,184.568 418.468,184.568 L340.357,184.568 Z"
          fill="#ffffff" />
      </g>
    </svg>
    <svg class="fab-icon fab-icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ffffff"
      stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18" />
      <line x1="6" y1="6" x2="18" y2="18" />
    </svg>
  </button>

  <!-- ── Chat panel ────────────────────────────── -->
  <div class="chatbot" id="chatbot">
    <!-- Header -->
    <header class="cb-header">
      <div class="cb-header-left">
        <svg class="cb-logo" viewBox="0 0 1582.54541015625 2048.0" width="22" height="28" aria-hidden="true">
          <g transform="matrix(1,0,0,1,791.272705078125,1024.0)">
            <path
              d="M-66.794,420.344 L280.715,420.344 C280.715,420.344 280.715,-67.9743 280.715,-195.244 C280.715,-347.787 157.056,-471.446 4.51312,-471.446 C-148.03,-471.446 -270.787,-347.787 -270.787,-195.244 L-270.787,216.352 C-270.787,329.179 -179.622,420.344 -66.794,420.344 Z"
              fill="none" stroke-width="69.12" stroke="#ffffff" stroke-linecap="square" stroke-linejoin="miter" />
            <path d="M-332.059,141.88 L-622.17,-25.5511 L-332.059,-192.982 L-332.059,141.88 Z" fill="#ffffff" />
            <path
              d="M218.247,355.761 L218.247,188.33 C218.247,95.8022 143.344,20.899 50.8163,20.899 C-41.7112,20.899 -116.614,95.8022 -116.614,188.33 C-116.614,280.857 -41.7112,355.761 50.8163,355.761 L218.247,355.761 Z"
              fill="#ffffff" />
            <path
              d="M340.357,184.568 L340.357,454.904 L418.468,454.904 C492.879,454.904 553.636,394.146 553.636,319.736 C553.636,245.325 492.879,184.568 418.468,184.568 L340.357,184.568 Z"
              fill="#ffffff" />
          </g>
        </svg>
        <div class="cb-header-info">
          <span class="cb-header-name">Beek</span>
          <span class="cb-header-status"><span class="cb-dot"></span>Travel Assistant</span>
        </div>
      </div>
      <div class="cb-header-actions">
        <button class="cb-hdr-btn" id="btn-new-chat" title="New chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
        <button class="cb-hdr-btn" id="btn-clear" title="Delete conversation">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-2 14H7L5 6" />
            <path d="M10 11v6" />
            <path d="M14 11v6" />
            <path d="M9 6V4h6v2" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Messages -->
    <div class="cb-messages" id="chat-messages">
      <div class="cb-welcome" id="welcome">
        <svg class="cb-welcome-bird" viewBox="0 0 1582.54541015625 2048.0" width="48" height="62" aria-hidden="true">
          <g transform="matrix(1,0,0,1,791.272705078125,1024.0)">
            <path
              d="M-66.794,420.344 L280.715,420.344 C280.715,420.344 280.715,-67.9743 280.715,-195.244 C280.715,-347.787 157.056,-471.446 4.51312,-471.446 C-148.03,-471.446 -270.787,-347.787 -270.787,-195.244 L-270.787,216.352 C-270.787,329.179 -179.622,420.344 -66.794,420.344 Z"
              fill="none" stroke-width="69.12" stroke="#7132f5" stroke-linecap="square" stroke-linejoin="miter" />
            <path d="M-332.059,141.88 L-622.17,-25.5511 L-332.059,-192.982 L-332.059,141.88 Z" fill="#7132f5" />
            <path
              d="M218.247,355.761 L218.247,188.33 C218.247,95.8022 143.344,20.899 50.8163,20.899 C-41.7112,20.899 -116.614,95.8022 -116.614,188.33 C-116.614,280.857 -41.7112,355.761 50.8163,355.761 L218.247,355.761 Z"
              fill="#7132f5" />
            <path
              d="M340.357,184.568 L340.357,454.904 L418.468,454.904 C492.879,454.904 553.636,394.146 553.636,319.736 C553.636,245.325 492.879,184.568 418.468,184.568 L340.357,184.568 Z"
              fill="#7132f5" />
          </g>
        </svg>
        <h2 class="cb-welcome-title">Where to next?</h2>
        <p class="cb-welcome-sub">Ask about destinations, itineraries, local tips, budgets, or anything travel!</p>
        <div class="cb-quick-prompts">
          <button class="cb-quick" data-prompt="Plan a 5-day trip to Tokyo on a budget">🇯🇵 5 days in Tokyo</button>
          <button class="cb-quick" data-prompt="What are the hidden gems in Bali?">🏝️ Bali hidden gems</button>
          <button class="cb-quick" data-prompt="Best street food cities in Southeast Asia">🍜 SE Asia food</button>
          <button class="cb-quick" data-prompt="I want a relaxing beach holiday in Europe, what do you recommend?">🏖️
            European beaches</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="cb-input-wrap">
      <div class="cb-input-row">
        <textarea id="chat-input" class="cb-input" placeholder="Ask me anything about travel..." rows="1"
          maxlength="2000"></textarea>
        <button class="cb-send" id="btn-send" disabled aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
      <div class="cb-disclaimer">Beek can make mistakes. Verify important info independently.</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
